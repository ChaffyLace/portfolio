services:
  db:
    image: mysql:8.0
    container_name: stockflow_db
    restart: always
    environment:
      MYSQL_DATABASE: stockflow_db
      MYSQL_ROOT_PASSWORD: root_password_secure
    ports:
      - "3306:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    networks:
      - stockflow_network

  backend:
    build: ./backend
    container_name: stockflow_backend
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root_password_secure
      - DB_NAME=stockflow_db
    depends_on:
      - db
    networks:
      - stockflow_network
      
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockflow_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - stockflow_network

volumes:
  db_data:

networks:
  stockflow_network:
    driver: bridge